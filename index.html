<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FitGo</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }
    header {
      background: #00b894;
      color: white;
      padding: 20px;
    }
    h1 {
      margin: 0;
    }
    section {
      padding: 30px;
    }
    .btn {
      background: #00b894;
      color: white;
      padding: 15px 25px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 8px;
    }
    .card {
      background: white;
      margin: 10px auto;
      padding: 20px;
      width: 80%;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>
  <h1>FitGo 🍏</h1>
  <p>Comida saludable directo a tu casa</p>
</header>

<section>
  <h2>¿Qué es FitGo?</h2>
  <div class="card">
    Somos una plataforma de delivery enfocada en comida saludable, rápida y accesible.
  </div>
</section>

<section>
  <h2>¿Qué ofrecemos?</h2>
  <div class="card">🥗 Ensaladas frescas</div>
  <div class="card">🍗 Proteínas saludables</div>
  <div class="card">🥤 Bebidas naturales</div>
</section>

<section>
  <h2>Pide ahora</h2>
  <button class="btn" onclick="alert('Pronto disponible 🚀')">
    Ordenar comida
  </button>
</section>

</body>
</html>
